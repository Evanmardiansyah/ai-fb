<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Content Intelligence System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .loader { border-top-color: #f97316; -webkit-animation: spinner 1s linear infinite; animation: spinner 1s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        /* Custom scrollbar for raw JSON */
        pre::-webkit-scrollbar { height: 8px; }
        pre::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 4px; }
    </style>
</head>
<body class="bg-slate-100 text-slate-800 font-sans min-h-screen">

    <header class="bg-slate-900 text-white p-4 shadow-lg border-b-4 border-orange-500">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <h1 class="text-xl md:text-2xl font-bold flex items-center gap-2">
                <i class="fa-solid fa-brain text-orange-500"></i> Content Intelligence System
            </h1>
            <div class="flex w-full md:w-auto gap-2">
                <div class="relative w-full md:w-80">
                    <i class="fa-solid fa-key absolute left-3 top-3 text-slate-400 text-sm"></i>
                    <input type="password" id="geminiApiKey" placeholder="Paste Gemini API Key di sini..." class="pl-9 pr-3 py-2 rounded bg-slate-800 border border-slate-700 text-white w-full text-sm focus:outline-none focus:border-orange-500 transition">
                </div>
                <button onclick="saveApiKey()" class="bg-orange-500 hover:bg-orange-600 px-4 py-2 rounded text-sm font-bold transition shadow-md whitespace-nowrap">Simpan Key</button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-4 mt-4 grid grid-cols-1 lg:grid-cols-4 gap-6">
        
        <aside class="space-y-6">
            <div class="bg-white p-5 rounded-xl shadow-md border border-slate-200">
                <h2 class="font-bold text-lg mb-4 text-slate-800"><i class="fa-solid fa-gear text-slate-500"></i> Engine Settings</h2>
                
                <div class="mb-4">
                    <label class="block text-sm font-bold mb-2 text-slate-700">Model AI</label>
                    <div class="relative">
                        <select id="modelSelect" class="w-full border-2 border-slate-200 rounded-lg p-3 text-sm focus:outline-none focus:border-orange-500 transition bg-white text-slate-700 appearance-none">
                            <option value="">Masukkan API Key dulu...</option>
                        </select>
                        <i class="fa-solid fa-chevron-down absolute right-4 top-4 text-slate-400 pointer-events-none"></i>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="block text-sm font-bold mb-2 text-slate-700">Niche / Topik</label>
                    <input type="text" id="nicheInput" placeholder="Misal: Fakta Semut Merah..." class="w-full border-2 border-slate-200 rounded-lg p-3 focus:outline-none focus:border-orange-500 transition text-sm">
                </div>

                <button id="generateBtn" onclick="generateIntelligence()" class="w-full bg-slate-900 hover:bg-slate-800 text-white font-bold py-3 px-4 rounded-lg transition flex justify-center items-center gap-2 shadow-lg">
                    <i class="fa-solid fa-bolt text-orange-500"></i> Jalankan Engine
                </button>
            </div>

            <div class="bg-white p-5 rounded-xl shadow-md border border-slate-200">
                <h2 class="font-bold text-sm mb-3 border-b pb-2 text-slate-600">History Niche</h2>
                <div id="historyList" class="space-y-2 max-h-[300px] overflow-y-auto text-sm"></div>
                <button onclick="clearHistory()" class="mt-4 w-full text-red-500 text-xs hover:underline"><i class="fa-solid fa-trash"></i> Hapus History</button>
            </div>
        </aside>

        <section class="lg:col-span-3">
            
            <div id="loadingIndicator" class="hidden bg-white rounded-xl shadow-md p-12 text-center border border-slate-200">
                <div class="loader border-4 border-slate-200 rounded-full w-14 h-14 mx-auto mb-6"></div>
                <h3 class="text-xl font-bold text-slate-800 mb-2">Engine Sedang Bekerja...</h3>
                <p class="text-slate-500 text-sm animate-pulse">Menghasilkan ide, menghitung skor viral, analisis mendalam, dan prompt gambar.</p>
            </div>

            <div id="outputContainer" class="hidden space-y-6">
                <div class="flex justify-between items-end mb-2">
                    <h2 class="text-2xl font-bold text-slate-800">Intelligence Report</h2>
                    <div class="flex gap-2">
                        <button onclick="toggleRawJson()" class="text-sm bg-slate-200 hover:bg-slate-300 px-3 py-1 rounded transition text-slate-700 font-medium"><i class="fa-solid fa-code"></i> View JSON</button>
                        <button onclick="copyRawJson()" class="text-sm bg-orange-100 hover:bg-orange-200 text-orange-700 px-3 py-1 rounded transition font-medium"><i class="fa-regular fa-copy"></i> Copy JSON</button>
                    </div>
                </div>

                <div id="jsonContainer" class="hidden">
                    <pre id="jsonDebug" class="p-4 bg-slate-900 text-green-400 rounded-xl text-sm overflow-x-auto shadow-inner"></pre>
                </div>

                <div id="visualOutput" class="space-y-8"></div>
            </div>

        </section>
    </main>

    <script>
        // --- State Management ---
        let rawJsonData = null;
        let historyData = JSON.parse(localStorage.getItem('intelHistory')) || [];

        // --- Initialization ---
        document.addEventListener('DOMContentLoaded', () => {
            const savedKey = localStorage.getItem('geminiApiKey');
            if (savedKey) {
                document.getElementById('geminiApiKey').value = savedKey;
                loadGeminiModels(savedKey);
            }
            renderHistory();
        });

        function saveApiKey() {
            const key = document.getElementById('geminiApiKey').value.trim();
            if(!key) return alert("API Key kosong!");
            localStorage.setItem('geminiApiKey', key);
            alert('API Key berhasil disimpan di browser!');
            loadGeminiModels(key);
        }

        // --- Fetch Dynamic Models ---
        async function loadGeminiModels(apiKey) {
            const modelSelect = document.getElementById('modelSelect');
            try {
                modelSelect.innerHTML = '<option>Loading models...</option>';
                modelSelect.disabled = true;
                
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${apiKey}`);
                if (!response.ok) throw new Error('Gagal mengambil daftar model. Cek API Key!');
                
                const data = await response.json();
                const textModels = data.models.filter(model => model.supportedGenerationMethods.includes("generateContent"));
                
                modelSelect.innerHTML = '';
                textModels.forEach(model => {
                    const option = document.createElement('option');
                    option.value = model.name;
                    option.textContent = model.displayName || model.name.replace('models/', '');
                    modelSelect.appendChild(option);
                });
                modelSelect.disabled = false;
            } catch (error) {
                modelSelect.innerHTML = '<option value="">Gagal memuat model</option>';
                alert(error.message);
            }
        }

        // --- Core Logic ---
        async function generateIntelligence() {
            const niche = document.getElementById('nicheInput').value.trim();
            const apiKey = document.getElementById('geminiApiKey').value.trim() || localStorage.getItem('geminiApiKey');
            const modelId = document.getElementById('modelSelect').value;

            if (!apiKey) return alert("Silakan masukkan Gemini API Key terlebih dahulu!");
            if (!modelId) return alert("Pilih Model AI terlebih dahulu!");
            if (!niche) return alert("Masukkan Niche/Topik!");

            const btn = document.getElementById('generateBtn');
            const loading = document.getElementById('loadingIndicator');
            const output = document.getElementById('outputContainer');
            
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Memproses...';
            loading.classList.remove('hidden');
            output.classList.add('hidden');
            document.getElementById('jsonContainer').classList.add('hidden');

            try {
                // Prompt diperbarui untuk mencakup Pembahasan Mendalam & Prompt Gambar
                const systemPrompt = `Anda adalah AI Content Intelligence System & Facebook Algorithm Expert.
TUGAS: Hasilkan 3 ide konten viral yang sangat mendetail untuk niche yang diberikan user.

Anda menjalankan 5 engine internal:
1. IDEA GENERATOR: Ide dengan format viral.
2. VIRAL SCORING ENGINE: Beri skor 0-10 (realistis).
3. VIRAL PREDICTION ENGINE: Prediksi potensi performa.
4. FB OPTIMIZATION ENGINE: Terapkan prinsip hook & storytelling ke angle & curiosity gap.
5. DEEP DIVE & VISUAL ENGINE: Buat analisis konten mendalam, strategi interaksi (pertanyaan pemicu), dan berikan prompt deskriptif dalam bahasa Inggris untuk image generator (DALL-E/Midjourney style).

ATURAN WAJIB:
- Output HARUS valid JSON.
- TIDAK BOLEH ada markdown (\`\`\`json) atau teks di luar JSON.
- Kembalikan format JSON persis seperti ini:
{
  "daftar_ide": [
    {
      "judul_ide": "",
      "format_viral": "",
      "angle": "",
      "curiosity_gap": "",
      "viral_scoring": { "curiosity": 0, "emotional_trigger": 0, "shareability": 0, "relatability": 0, "clarity": 0, "trend_potential": 0, "total_score": 0.0 },
      "prediksi_performa": { "potensi_like": "", "potensi_komentar": "", "potensi_share": "", "rekomendasi_target_audience": "" },
      "pembahasan_mendalam": {
         "analisis_konten": "",
         "profil_audiens": "",
         "strategi_engagement": ""
      },
      "ide_visual": {
         "prompt_gambar_en": ""
      }
    }
  ]
}`;

                const modelPath = modelId.startsWith('models/') ? modelId : `models/${modelId}`;
                const endpoint = `https://generativelanguage.googleapis.com/v1beta/${modelPath}:generateContent?key=${apiKey}`;

                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        system_instruction: { parts: [{ text: systemPrompt }] },
                        contents: [{ parts: [{ text: `Niche user: ${niche}` }] }],
                        generationConfig: {
                            responseMimeType: "application/json",
                            temperature: 0.7
                        }
                    })
                });

                if (!response.ok) {
                    const errData = await response.json();
                    throw new Error(errData.error?.message || "Terjadi kesalahan pada server Gemini");
                }

                const data = await response.json();
                let jsonText = data.candidates[0].content.parts[0].text;
                jsonText = jsonText.replace(/^```json\s*/, '').replace(/\s*```$/, '');
                
                rawJsonData = JSON.parse(jsonText);
                
                renderVisualData(rawJsonData);
                document.getElementById('jsonDebug').textContent = JSON.stringify(rawJsonData, null, 2);
                
                saveHistory(niche);
                output.classList.remove('hidden');

            } catch (error) {
                console.error(error);
                alert("Gagal mengambil data: \n" + error.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fa-solid fa-bolt text-orange-500"></i> Jalankan Engine';
                loading.classList.add('hidden');
            }
        }

        // --- Render UI ---
        function renderVisualData(data) {
            const container = document.getElementById('visualOutput');
            container.innerHTML = '';

            data.daftar_ide.forEach((ide, idx) => {
                const score = ide.viral_scoring.total_score.toFixed(1);
                let scoreColor = score >= 8 ? 'text-green-600' : (score >= 6 ? 'text-orange-500' : 'text-red-500');

                const card = document.createElement('div');
                card.className = "bg-white rounded-xl shadow-md border border-slate-200 overflow-hidden mb-8";
                
                card.innerHTML = `
                    <div class="p-6 border-b border-slate-200 bg-white">
                        <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                            <div>
                                <span class="inline-block bg-slate-100 text-slate-600 text-xs px-2 py-1 rounded font-bold mb-2 uppercase tracking-wide">${ide.format_viral}</span>
                                <h3 class="text-2xl font-bold text-slate-800 leading-tight">${ide.judul_ide}</h3>
                            </div>
                            <div class="flex flex-col items-center bg-slate-50 px-5 py-3 rounded-lg border border-slate-200 min-w-[120px]">
                                <span class="text-xs text-slate-500 font-bold uppercase">Viral Score</span>
                                <span class="text-4xl font-black ${scoreColor}">${score}</span>
                            </div>
                        </div>
                    </div>

                    <div class="p-6 grid grid-cols-1 lg:grid-cols-2 gap-8 bg-slate-50">
                        <div class="space-y-6">
                            <div>
                                <h4 class="text-sm font-bold text-slate-800 mb-2 flex items-center gap-2"><i class="fa-solid fa-pen-nib text-slate-400"></i> Angle & FB Optimization</h4>
                                <p class="text-sm text-slate-600 bg-white p-4 rounded-lg border border-slate-200 leading-relaxed shadow-sm">${ide.angle}</p>
                            </div>
                            <div>
                                <h4 class="text-sm font-bold text-slate-800 mb-2 flex items-center gap-2"><i class="fa-solid fa-magnet text-slate-400"></i> Curiosity Gap (Hook)</h4>
                                <p class="text-sm text-slate-700 bg-orange-50 p-4 rounded-lg border border-orange-100 leading-relaxed shadow-sm font-medium">${ide.curiosity_gap}</p>
                            </div>
                        </div>

                        <div class="space-y-6">
                            <div class="bg-white p-4 rounded-lg border border-slate-200 shadow-sm">
                                <h4 class="text-xs font-bold text-slate-800 mb-3 flex items-center gap-2"><i class="fa-solid fa-chart-bar text-slate-400"></i> Scoring Metrics</h4>
                                <div class="grid grid-cols-2 gap-3 text-xs">
                                    <div><span class="block text-slate-500 mb-1">Curiosity</span><div class="w-full bg-slate-100 rounded-full h-1.5"><div class="bg-blue-500 h-1.5 rounded-full" style="width: ${ide.viral_scoring.curiosity * 10}%"></div></div></div>
                                    <div><span class="block text-slate-500 mb-1">Emotion</span><div class="w-full bg-slate-100 rounded-full h-1.5"><div class="bg-rose-500 h-1.5 rounded-full" style="width: ${ide.viral_scoring.emotional_trigger * 10}%"></div></div></div>
                                    <div><span class="block text-slate-500 mb-1">Shareability</span><div class="w-full bg-slate-100 rounded-full h-1.5"><div class="bg-green-500 h-1.5 rounded-full" style="width: ${ide.viral_scoring.shareability * 10}%"></div></div></div>
                                    <div><span class="block text-slate-500 mb-1">Trend</span><div class="w-full bg-slate-100 rounded-full h-1.5"><div class="bg-purple-500 h-1.5 rounded-full" style="width: ${ide.viral_scoring.trend_potential * 10}%"></div></div></div>
                                </div>
                            </div>

                            <div class="bg-blue-50 border border-blue-100 p-4 rounded-lg shadow-sm">
                                <h4 class="text-xs font-bold text-blue-800 mb-3 flex items-center gap-2"><i class="fa-solid fa-bullseye"></i> Prediction Engine</h4>
                                <div class="grid grid-cols-3 gap-2 text-center text-xs font-medium text-slate-700 mb-3">
                                    <div><i class="fa-regular fa-thumbs-up block text-lg mb-1 text-blue-500"></i> ${ide.prediksi_performa.potensi_like}</div>
                                    <div><i class="fa-regular fa-comment block text-lg mb-1 text-blue-500"></i> ${ide.prediksi_performa.potensi_komentar}</div>
                                    <div><i class="fa-solid fa-share block text-lg mb-1 text-blue-500"></i> ${ide.prediksi_performa.potensi_share}</div>
                                </div>
                                <div class="text-xs text-blue-800 border-t border-blue-200 pt-2 bg-blue-100/50 p-2 rounded">
                                    <strong>Target:</strong> ${ide.prediksi_performa.rekomendasi_target_audience}
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="p-6 border-t border-slate-200 bg-white">
                        <h3 class="text-lg font-bold text-slate-800 mb-4 border-l-4 border-orange-500 pl-3">Hub Analisis & Diskusi Mendalam</h3>
                        <div class="space-y-4">
                            <div>
                                <h4 class="text-sm font-bold text-slate-700 mb-1">Analisis Konten Komprehensif</h4>
                                <p class="text-sm text-slate-600 leading-relaxed">${ide.pembahasan_mendalam.analisis_konten}</p>
                            </div>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-4">
                                <div class="bg-slate-50 p-3 rounded border border-slate-100">
                                    <h4 class="text-xs font-bold text-slate-700 mb-1"><i class="fa-solid fa-users text-blue-500"></i> Profil Audiens Detail</h4>
                                    <p class="text-xs text-slate-600">${ide.pembahasan_mendalam.profil_audiens}</p>
                                </div>
                                <div class="bg-slate-50 p-3 rounded border border-slate-100">
                                    <h4 class="text-xs font-bold text-slate-700 mb-1"><i class="fa-regular fa-comments text-green-500"></i> Strategi Engagement</h4>
                                    <p class="text-xs text-slate-600">${ide.pembahasan_mendalam.strategi_engagement}</p>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="p-6 border-t border-slate-200 bg-slate-900 image-generator-section text-white rounded-b-xl">
                        <h3 class="text-lg font-bold mb-4 border-l-4 border-purple-500 pl-3 flex items-center gap-2">
                            <i class="fa-solid fa-wand-magic-sparkles text-purple-400"></i> Mesin Kecerdasan Gambar
                        </h3>
                        
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
                            <div class="md:col-span-2">
                                <label class="block text-xs text-slate-400 mb-1 font-bold uppercase tracking-wider">Prompt AI (Bisa Diedit)</label>
                                <textarea class="image-prompt w-full bg-slate-800 border border-slate-700 rounded p-3 text-sm focus:border-purple-500 focus:outline-none" rows="2">${ide.ide_visual.prompt_gambar_en}</textarea>
                            </div>
                            <div>
                                <label class="block text-xs text-slate-400 mb-1 font-bold uppercase tracking-wider">Style</label>
                                <select class="image-style w-full bg-slate-800 border border-slate-700 rounded p-3 text-sm focus:border-purple-500 focus:outline-none h-[calc(100%-1.5rem)]">
                                    <option value="photorealistic, 8k, highly detailed">Photorealistic</option>
                                    <option value="3d render, octane render, vibrant colors">3D Render</option>
                                    <option value="digital illustration, vibrant, trending on artstation">Illustration</option>
                                    <option value="macro photography, extreme close up, depth of field">Macro Photo</option>
                                </select>
                            </div>
                        </div>
                        
                        <button onclick="generateImage(this)" class="w-full bg-purple-600 hover:bg-purple-700 text-white font-bold py-3 px-4 rounded transition flex justify-center items-center gap-2 shadow-lg mb-4">
                            <i class="fa-regular fa-image"></i> Generate Image (Free AI)
                        </button>

                        <div class="image-result-container hidden mt-4 bg-slate-800 rounded-lg p-2 border border-slate-700 flex justify-center items-center min-h-[200px]">
                            <span class="image-loading text-purple-400 animate-pulse hidden"><i class="fa-solid fa-circle-notch fa-spin mr-2"></i> Sedang Melukis...</span>
                            <img class="result-image rounded hidden max-w-full max-h-[400px] object-contain shadow-lg" src="" alt="Generated Visual">
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // --- Fitur Generate Gambar Gratis (Pollinations.ai) ---
        function generateImage(btnElement) {
            const section = btnElement.closest('.image-generator-section');
            const prompt = section.querySelector('.image-prompt').value;
            const style = section.querySelector('.image-style').value;
            const container = section.querySelector('.image-result-container');
            const imgElement = section.querySelector('.result-image');
            const loading = section.querySelector('.image-loading');

            if (!prompt) return alert("Prompt gambar tidak boleh kosong!");

            // Tampilkan area loading
            container.classList.remove('hidden');
            imgElement.classList.add('hidden');
            loading.classList.remove('hidden');
            btnElement.disabled = true;

            // Buat URL API Pollinations (gratis, tanpa API Key)
            const finalPrompt = encodeURIComponent(`${prompt}, ${style}`);
            // Tambahkan parameter acak (seed) agar gambar beda terus tiap di klik
            const randomSeed = Math.floor(Math.random() * 100000);
            const imageUrl = `https://image.pollinations.ai/prompt/${finalPrompt}?width=1024&height=768&nologo=true&seed=${randomSeed}`;

            imgElement.onload = () => {
                loading.classList.add('hidden');
                imgElement.classList.remove('hidden');
                btnElement.disabled = false;
            };

            imgElement.onerror = () => {
                loading.innerHTML = '<i class="fa-solid fa-triangle-exclamation text-red-500 mr-2"></i> Gagal memuat gambar.';
                btnElement.disabled = false;
            };

            // Set source untuk mentrigger download gambar
            imgElement.src = imageUrl;
        }

        // --- Utility ---
        function toggleRawJson() {
            document.getElementById('jsonContainer').classList.toggle('hidden');
        }

        function copyRawJson() {
            if (!rawJsonData) return;
            navigator.clipboard.writeText(JSON.stringify(rawJsonData, null, 2)).then(() => alert("Data JSON disalin!"));
        }

        function saveHistory(topic) {
            if(!historyData.includes(topic)) {
                historyData.unshift(topic);
                if (historyData.length > 10) historyData.pop();
                localStorage.setItem('intelHistory', JSON.stringify(historyData));
                renderHistory();
            }
        }

        function renderHistory() {
            const list = document.getElementById('historyList');
            list.innerHTML = '';
            historyData.forEach(topic => {
                const btn = document.createElement('button');
                btn.className = "block w-full text-left truncate px-3 py-2 bg-slate-50 hover:bg-slate-100 rounded border border-slate-100 transition";
                btn.innerText = topic;
                btn.onclick = () => document.getElementById('nicheInput').value = topic;
                list.appendChild(btn);
            });
        }

        function clearHistory() {
            if(confirm("Hapus semua history?")) {
                localStorage.removeItem('intelHistory');
                historyData = [];
                renderHistory();
            }
        }
    </script>
</body>
</html>
