<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Content Intelligence System</title>
    <script src="[https://cdn.tailwindcss.com](https://cdn.tailwindcss.com)"></script>
    <link href="[https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css](https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css)" rel="stylesheet">
    <style>
        .loader { border-top-color: #f97316; -webkit-animation: spinner 1s linear infinite; animation: spinner 1s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        /* Custom scrollbar for raw JSON */
        pre::-webkit-scrollbar { height: 8px; }
        pre::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 4px; }
    </style>
</head>
<body class="bg-slate-100 text-slate-800 font-sans min-h-screen">

    <header class="bg-slate-900 text-white p-4 shadow-lg border-b-4 border-orange-500">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <h1 class="text-xl md:text-2xl font-bold flex items-center gap-2">
                <i class="fa-solid fa-brain text-orange-500"></i> Content Intelligence System
            </h1>
            <div class="flex w-full md:w-auto gap-2">
                <div class="relative w-full md:w-80">
                    <i class="fa-solid fa-key absolute left-3 top-3 text-slate-400 text-sm"></i>
                    <input type="password" id="geminiApiKey" placeholder="Paste Gemini API Key di sini..." class="pl-9 pr-3 py-2 rounded bg-slate-800 border border-slate-700 text-white w-full text-sm focus:outline-none focus:border-orange-500 transition">
                </div>
                <button onclick="saveApiKey()" class="bg-orange-500 hover:bg-orange-600 px-4 py-2 rounded text-sm font-bold transition shadow-md whitespace-nowrap">Simpan Key</button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-4 mt-4 grid grid-cols-1 lg:grid-cols-4 gap-6">
        
        <aside class="space-y-6">
            <div class="bg-white p-5 rounded-xl shadow-md border border-slate-200">
                <h2 class="font-bold text-lg mb-4 text-slate-800"><i class="fa-solid fa-gear text-slate-500"></i> Engine Settings</h2>
                
                <div class="mb-4">
                    <label class="block text-sm font-bold mb-2 text-slate-700">Model AI</label>
                    <select id="modelSelect" class="w-full border-2 border-slate-200 rounded-lg p-3 text-sm focus:outline-none focus:border-orange-500 transition bg-white text-slate-700">
                        <option value="">Masukkan API Key dulu...</option>
                    </select>
                </div>

                <div class="mb-4">
                    <label class="block text-sm font-bold mb-2 text-slate-700">Niche / Topik</label>
                    <input type="text" id="nicheInput" placeholder="Misal: Investasi Saham Pemula..." class="w-full border-2 border-slate-200 rounded-lg p-3 focus:outline-none focus:border-orange-500 transition text-sm">
                </div>

                <button id="generateBtn" onclick="generateIntelligence()" class="w-full bg-slate-900 hover:bg-slate-800 text-white font-bold py-3 px-4 rounded-lg transition flex justify-center items-center gap-2 shadow-lg">
                    <i class="fa-solid fa-bolt text-orange-500"></i> Jalankan Engine
                </button>
            </div>

            <div class="bg-white p-5 rounded-xl shadow-md border border-slate-200">
                <h2 class="font-bold text-sm mb-3 border-b pb-2 text-slate-600">History Niche</h2>
                <div id="historyList" class="space-y-2 max-h-[300px] overflow-y-auto text-sm"></div>
                <button onclick="clearHistory()" class="mt-4 w-full text-red-500 text-xs hover:underline"><i class="fa-solid fa-trash"></i> Hapus History</button>
            </div>
        </aside>

        <section class="lg:col-span-3">
            
            <div id="loadingIndicator" class="hidden bg-white rounded-xl shadow-md p-12 text-center border border-slate-200">
                <div class="loader border-4 border-slate-200 rounded-full w-14 h-14 mx-auto mb-6"></div>
                <h3 class="text-xl font-bold text-slate-800 mb-2">Engine Sedang Bekerja...</h3>
                <p class="text-slate-500 text-sm animate-pulse">Menghasilkan ide, menghitung skor viral, dan memprediksi performa.</p>
            </div>

            <div id="outputContainer" class="hidden space-y-6">
                <div class="flex justify-between items-end mb-2">
                    <h2 class="text-2xl font-bold text-slate-800">Intelligence Report</h2>
                    <div class="flex gap-2">
                        <button onclick="toggleRawJson()" class="text-sm bg-slate-200 hover:bg-slate-300 px-3 py-1 rounded transition text-slate-700 font-medium"><i class="fa-solid fa-code"></i> View JSON</button>
                        <button onclick="copyRawJson()" class="text-sm bg-orange-100 hover:bg-orange-200 text-orange-700 px-3 py-1 rounded transition font-medium"><i class="fa-regular fa-copy"></i> Copy JSON</button>
                    </div>
                </div>

                <div id="jsonContainer" class="hidden">
                    <pre id="jsonDebug" class="p-4 bg-slate-900 text-green-400 rounded-xl text-sm overflow-x-auto shadow-inner"></pre>
                </div>

                <div id="visualOutput" class="space-y-4">
                    </div>
            </div>

        </section>
    </main>

    <script>
        // --- State Management ---
        let rawJsonData = null;
        let historyData = JSON.parse(localStorage.getItem('intelHistory')) || [];

        // --- Initialization ---
        document.addEventListener('DOMContentLoaded', () => {
            const savedKey = localStorage.getItem('geminiApiKey');
            if (savedKey) {
                document.getElementById('geminiApiKey').value = savedKey;
                loadGeminiModels(savedKey); // Fetch model otomatis saat load
            }
            renderHistory();
        });

        function saveApiKey() {
            const key = document.getElementById('geminiApiKey').value.trim();
            if(!key) return alert("API Key kosong!");
            localStorage.setItem('geminiApiKey', key);
            alert('API Key berhasil disimpan di browser!');
            loadGeminiModels(key);
        }

        // --- Fetch Dynamic Models dari Gemini ---
        async function loadGeminiModels(apiKey) {
            const modelSelect = document.getElementById('modelSelect');
            try {
                modelSelect.innerHTML = '<option>Loading models...</option>';
                modelSelect.disabled = true;
                
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${apiKey}`);
                
                if (!response.ok) throw new Error('Gagal mengambil daftar model. Cek API Key!');
                
                const data = await response.json();
                
                // Filter model yang mensupport text generation (seperti flash, pro)
                const textModels = data.models.filter(model => 
                    model.supportedGenerationMethods.includes("generateContent")
                );
                
                modelSelect.innerHTML = '';
                textModels.forEach(model => {
                    const option = document.createElement('option');
                    option.value = model.name;
                    option.textContent = model.displayName || model.name.replace('models/', '');
                    modelSelect.appendChild(option);
                });
                modelSelect.disabled = false;
                
            } catch (error) {
                console.error("Error fetching models:", error);
                modelSelect.innerHTML = '<option value="">Gagal memuat model</option>';
                alert(error.message);
            }
        }

        // --- Core Logic ---
        async function generateIntelligence() {
            const niche = document.getElementById('nicheInput').value.trim();
            const apiKey = document.getElementById('geminiApiKey').value.trim() || localStorage.getItem('geminiApiKey');
            const modelId = document.getElementById('modelSelect').value;

            if (!apiKey) return alert("Silakan masukkan Gemini API Key terlebih dahulu!");
            if (!modelId) return alert("Pilih Model AI terlebih dahulu!");
            if (!niche) return alert("Masukkan Niche/Topik!");

            const btn = document.getElementById('generateBtn');
            const loading = document.getElementById('loadingIndicator');
            const output = document.getElementById('outputContainer');
            
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Memproses...';
            loading.classList.remove('hidden');
            output.classList.add('hidden');
            document.getElementById('jsonContainer').classList.add('hidden');

            try {
                // System prompt yang sangat ketat untuk JSON dan aturan Engine
                const systemPrompt = `Anda adalah AI Content Intelligence System & Facebook Algorithm Expert.
TUGAS: Hasilkan 7 ide konten viral untuk niche yang diberikan user.

Anda menjalankan 4 engine internal:
1. IDEA GENERATOR: 7 ide dengan format viral (angka, curiosity gap, problem-solution, myth vs fact, before-after, storytelling). Tidak boleh berulang.
2. VIRAL SCORING ENGINE: Beri skor 0-10 (realistis) untuk curiosity, emotional_trigger, shareability, relatability, clarity, trend_potential. Hitung total_score (rata-rata).
3. VIRAL PREDICTION ENGINE: Prediksi potensi like (rendah/sedang/tinggi), komentar, share, dan audiens.
4. FB OPTIMIZATION ENGINE: Terapkan prinsip hook 2 kalimat awal, conversation trigger, dan emotional storytelling ke dalam "angle" dan "curiosity_gap" yang dihasilkan.

ATURAN WAJIB:
- Output HARUS valid JSON.
- TIDAK BOLEH ada teks, penjelasan, markdown (\`\`\`json), atau pembuka/penutup di luar JSON.
- Hanya kembalikan format JSON persis seperti ini:
{
  "daftar_ide": [
    {
      "judul_ide": "",
      "format_viral": "",
      "angle": "",
      "curiosity_gap": "",
      "viral_scoring": { "curiosity": 0, "emotional_trigger": 0, "shareability": 0, "relatability": 0, "clarity": 0, "trend_potential": 0, "total_score": 0.0 },
      "prediksi_performa": { "potensi_like": "", "potensi_komentar": "", "potensi_share": "", "rekomendasi_target_audience": "" }
    }
  ]
}`;

                // Integrasi Gemini API Endpoint
                const modelPath = modelId.startsWith('models/') ? modelId : `models/${modelId}`;
                const endpoint = `https://generativelanguage.googleapis.com/v1beta/${modelPath}:generateContent?key=${apiKey}`;

                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        system_instruction: { 
                            parts: [{ text: systemPrompt }] 
                        },
                        contents: [{ 
                            parts: [{ text: `Niche user: ${niche}` }] 
                        }],
                        generationConfig: {
                            responseMimeType: "application/json", // Memaksa format JSON dari Gemini
                            temperature: 0.7
                        }
                    })
                });

                if (!response.ok) {
                    const errData = await response.json();
                    throw new Error(errData.error?.message || "Terjadi kesalahan pada server Gemini");
                }

                const data = await response.json();
                let jsonText = data.candidates[0].content.parts[0].text;
                
                // Pembersihan keamanan: Kadang AI tetap menyelipkan tag markdown ```json
                jsonText = jsonText.replace(/^```json\s*/, '').replace(/\s*```$/, '');
                
                // Parsing hasil
                rawJsonData = JSON.parse(jsonText);
                
                renderVisualData(rawJsonData);
                document.getElementById('jsonDebug').textContent = JSON.stringify(rawJsonData, null, 2);
                
                saveHistory(niche);
                output.classList.remove('hidden');

            } catch (error) {
                console.error(error);
                alert("Gagal mengambil data dari Gemini: \n" + error.message + "\n\nPastikan API Key benar dan koneksi internet stabil.");
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fa-solid fa-bolt text-orange-500"></i> Jalankan Engine';
                loading.classList.add('hidden');
            }
        }

        // --- UI Rendering ---
        function renderVisualData(data) {
            const container = document.getElementById('visualOutput');
            container.innerHTML = '';

            data.daftar_ide.forEach((ide, idx) => {
                const score = ide.viral_scoring.total_score.toFixed(1);
                let scoreColor = score >= 8 ? 'text-green-600' : (score >= 6 ? 'text-orange-500' : 'text-red-500');

                const card = document.createElement('div');
                card.className = "bg-white p-6 rounded-xl shadow-sm border border-slate-200 hover:shadow-md transition";
                
                card.innerHTML = `
                    <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 border-b border-slate-100 pb-4 mb-4">
                        <div>
                            <span class="inline-block bg-slate-100 text-slate-600 text-xs px-2 py-1 rounded font-bold mb-2 uppercase tracking-wide">${ide.format_viral}</span>
                            <h3 class="text-xl font-bold text-slate-800 leading-tight">${ide.judul_ide}</h3>
                        </div>
                        <div class="flex flex-col items-center bg-slate-50 px-4 py-2 rounded-lg border border-slate-200 min-w-[100px]">
                            <span class="text-xs text-slate-500 font-bold uppercase">Viral Score</span>
                            <span class="text-3xl font-black ${scoreColor}">${score}</span>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="space-y-4">
                            <div>
                                <h4 class="text-sm font-bold text-slate-800 mb-1 flex items-center gap-2"><i class="fa-solid fa-pen-nib text-slate-400"></i> Angle & FB Optimization</h4>
                                <p class="text-sm text-slate-600 bg-slate-50 p-3 rounded border border-slate-100 leading-relaxed">${ide.angle}</p>
                            </div>
                            <div>
                                <h4 class="text-sm font-bold text-slate-800 mb-1 flex items-center gap-2"><i class="fa-solid fa-magnet text-slate-400"></i> Curiosity Gap (Hook)</h4>
                                <p class="text-sm text-slate-600 bg-orange-50 p-3 rounded border border-orange-100 leading-relaxed">${ide.curiosity_gap}</p>
                            </div>
                        </div>

                        <div class="space-y-4">
                            <div class="grid grid-cols-2 gap-2 text-xs">
                                <div class="bg-slate-50 p-2 rounded border border-slate-100">
                                    <span class="block text-slate-500 mb-1">Curiosity</span>
                                    <div class="w-full bg-slate-200 rounded-full h-1.5"><div class="bg-blue-500 h-1.5 rounded-full" style="width: ${ide.viral_scoring.curiosity * 10}%"></div></div>
                                </div>
                                <div class="bg-slate-50 p-2 rounded border border-slate-100">
                                    <span class="block text-slate-500 mb-1">Emotion</span>
                                    <div class="w-full bg-slate-200 rounded-full h-1.5"><div class="bg-rose-500 h-1.5 rounded-full" style="width: ${ide.viral_scoring.emotional_trigger * 10}%"></div></div>
                                </div>
                                <div class="bg-slate-50 p-2 rounded border border-slate-100">
                                    <span class="block text-slate-500 mb-1">Shareability</span>
                                    <div class="w-full bg-slate-200 rounded-full h-1.5"><div class="bg-green-500 h-1.5 rounded-full" style="width: ${ide.viral_scoring.shareability * 10}%"></div></div>
                                </div>
                                <div class="bg-slate-50 p-2 rounded border border-slate-100">
                                    <span class="block text-slate-500 mb-1">Trend</span>
                                    <div class="w-full bg-slate-200 rounded-full h-1.5"><div class="bg-purple-500 h-1.5 rounded-full" style="width: ${ide.viral_scoring.trend_potential * 10}%"></div></div>
                                </div>
                            </div>

                            <div class="bg-blue-50 border border-blue-100 p-3 rounded-lg">
                                <h4 class="text-xs font-bold text-blue-800 mb-2 flex items-center gap-1"><i class="fa-solid fa-chart-line"></i> Prediction Engine</h4>
                                <div class="grid grid-cols-3 gap-2 text-center text-xs font-medium text-slate-700">
                                    <div><i class="fa-regular fa-thumbs-up block text-lg mb-1"></i> ${ide.prediksi_performa.potensi_like}</div>
                                    <div><i class="fa-regular fa-comment block text-lg mb-1"></i> ${ide.prediksi_performa.potensi_komentar}</div>
                                    <div><i class="fa-solid fa-share block text-lg mb-1"></i> ${ide.prediksi_performa.potensi_share}</div>
                                </div>
                                <div class="mt-3 text-xs text-blue-700 border-t border-blue-200 pt-2">
                                    <strong>Target:</strong> ${ide.prediksi_performa.rekomendasi_target_audience}
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function toggleRawJson() {
            const container = document.getElementById('jsonContainer');
            container.classList.toggle('hidden');
        }

        function copyRawJson() {
            if (!rawJsonData) return;
            const text = JSON.stringify(rawJsonData, null, 2);
            navigator.clipboard.writeText(text).then(() => alert("Data JSON berhasil disalin!"));
        }

        // --- History ---
        function saveHistory(topic) {
            if(!historyData.includes(topic)) {
                historyData.unshift(topic);
                if (historyData.length > 10) historyData.pop();
                localStorage.setItem('intelHistory', JSON.stringify(historyData));
                renderHistory();
            }
        }

        function renderHistory() {
            const list = document.getElementById('historyList');
            list.innerHTML = '';
            historyData.forEach(topic => {
                const btn = document.createElement('button');
                btn.className = "block w-full text-left truncate px-3 py-2 bg-slate-50 hover:bg-slate-100 rounded border border-slate-100 transition";
                btn.innerText = topic;
                btn.onclick = () => {
                    document.getElementById('nicheInput').value = topic;
                };
                list.appendChild(btn);
            });
        }

        function clearHistory() {
            if(confirm("Hapus semua history niche?")) {
                localStorage.removeItem('intelHistory');
                historyData = [];
                renderHistory();
            }
        }
    </script>
</body>
</html>
